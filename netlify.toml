# Netlify deploy config for the Каркас app (Expo react-native-web → static site).
# Git-connected deploys: point Netlify at this repo; these settings are picked up automatically.
[build]
  base = "ui"                      # the Expo app lives in ui/
  # build-engine.mjs regenerates ui/_engine (gitignored) from ../engine, THEN export the web app.
  command = "node scripts/build-engine.mjs && npx expo export -p web"
  publish = "dist"                 # relative to base → ui/dist

# Single-page app: serve index.html for any path (no server-side routing).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
